<body>
    <div class="container">
            <h1>Rock paper sicissors</h1>
            <button class="rock" onclick="calculator('rock'); "><img class="button-move" src="rock-emoji.png"></button>    
            <button class="paper" onclick="calculator('paper');"><img class="button-move" src="paper-emoji.png"></button>
            <button onclick="calculator('sicissors');"><img class="button-move" src="sicissors-emoji.png"></button><br>
            <div class="reset-button"><button class="reset" onclick=" reset(); "> Reset the score</button></div>
            <p class="display"></p>
    </div>
    
   
      
     <!-- If i reset the score the score will be rremoved from the localstorage-->

    <script>
        let score= JSON.parse(localStorage.getItem('score'))|| {
            wins:0,
            loss:0,
            tie:0,
        };
        
       

     // if i reseted the local storage will be empty so i gave default value for score   
        function calculator(playerMove){
            const computerMove=makeComputermove();
            let result='';
            if(playerMove==='rock'){
                if(computerMove==='rock'){
                    result='The match is Tie';
                } else if(computerMove==='paper'){
                    result='You loss';
                } else if(computerMove==='sicissors'){
                    result='You won';
                }
                
                 
            } else if( playerMove==='paper'){
                if(computerMove==='rock'){
                    result='You won';
                } else if(computerMove==='paper'){
                    result='The match is Tie';
                } else if( computerMove==='sicissors'){
                    result='You loss';
                }
                
            } else if(playerMove==='sicissors'){
                if(computerMove==='sicissors'){
                    result='The match is Tie';
                } else if(computerMove==='paper'){
                    result='You loss'
                } else if(computerMove==='rock'){
                    result='You won';
                }
                
            }
            if(result ==='You won'){
                score.wins+=1;
            }else if(result==='The match is Tie'){
                score.tie+=1;
            }else if(result==='You loss'){
                score.loss+=1;
            }

            localStorage.setItem("score",JSON.stringify(score));
            // the score which is calculated above is stored in local storage .. it will be stored untill u use reset . if you reset also you will not be able to change the history;

            //alert(`You took ${playerMove}.\n The computer took ${computerMove}.\n ${result} \nwins: ${score.wins}\n loss:${score.loss}\n Ties:${score.tie} `);
            document.querySelector('.display').innerHTML = ` ${result} <br>You took <img class="button-move" src="/channelpic/${playerMove}-emoji.png">  The computer took <img class="button-move" src="/channelpic/${computerMove}-emoji.png"> .<br><br> wins: ${score.wins}\n loss:${score.loss}\n Ties:${score.tie} `; 

            return result;
        }
        function makeComputermove(){                  // generate a move for the computer
            const randomNumber=Math.random();         // Math.random generate value between 0 to 1
            let computerMove='';
            if(randomNumber>=0 && randomNumber<=1/3){
                computerMove='rock';
            } else if (randomNumber>=1/3 && randomNumber<2/3){
                computerMove='paper';
            } else if( randomNumber>=2/3 && randomNumber<=1){
                computerMove='sicissors';
            }
            return computerMove;
        }

        function reset(){
            score.loss=0;score.wins=0;score.tie=0; localStorage.removeItem('score');
            document.querySelector('.display').innerHTML = `wins: ${score.wins}\n loss:${score.loss}\n Ties:${score.tie} `; 
        }


        document.addEventListener('keydown', (event) => {
            if(event.key === 'r'){
                  calculator('rock');
            }else if(event.key === 'p'){
                  calculator('paper');
            }else if(event.key === 's'){
                  calculator('sicissors');
            }
        })



    </script>
