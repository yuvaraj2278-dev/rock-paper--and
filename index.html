<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Sicissors</title>

<style>
body{
    background-color:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    margin-top:80px;
    justify-self:center;
    border:2px solid aqua;
    padding:80px;
    border-radius:40px;
}

h1{
    text-align:center;
    margin-bottom:50px;
}

button{
    background-color:transparent;
    border:2px solid aqua;
    border-radius:50%;
    padding:20px;
    margin:10px;
    cursor:pointer;
}

.button-move{
    width:60px;
}

.reset{
    border-radius:25px;
    padding:12px 20px;
    color:white;
}

.reset-box{
    text-align:center;
    margin-top:25px;
}

.display{
    margin-top:30px;
    text-align:center;
    font-size:22px;
    line-height:2;
}
</style>
</head>

<body>

<div class="container">

<h1>Rock Paper Sicissors</h1>

<div style="text-align:center;">

<button onclick="playGame('rock')">
<img class="button-move" src="rock-emoji.png">
</button>

<button onclick="playGame('paper')">
<img class="button-move" src="paper-emoji.png">
</button>

<button onclick="playGame('sicissors')">
<img class="button-move" src="sicissors-emoji.png">
</button>

</div>

<div class="reset-box">
<button class="reset" onclick="resetScore()">Reset Score</button>
</div>

<p class="display"></p>

</div>

<script>

let score = JSON.parse(localStorage.getItem('score')) || {
    wins:0,
    loss:0,
    tie:0
};

function playGame(playerMove){

    const computerMove = makeComputerMove();
    let result = '';

    if(playerMove === 'rock'){

        if(computerMove === 'rock'){
            result = 'Tie';
        }
        else if(computerMove === 'paper'){
            result = 'You Loss';
        }
        else{
            result = 'You Won';
        }

    }

    else if(playerMove === 'paper'){

        if(computerMove === 'rock'){
            result = 'You Won';
        }
        else if(computerMove === 'paper'){
            result = 'Tie';
        }
        else{
            result = 'You Loss';
        }

    }

    else if(playerMove === 'sicissors'){

        if(computerMove === 'rock'){
            result = 'You Loss';
        }
        else if(computerMove === 'paper'){
            result = 'You Won';
        }
        else{
            result = 'Tie';
        }

    }

    if(result === 'You Won'){
        score.wins++;
    }
    else if(result === 'You Loss'){
        score.loss++;
    }
    else{
        score.tie++;
    }

    localStorage.setItem('score', JSON.stringify(score));

    document.querySelector('.display').innerHTML =
    `${result}<br><br>

    You took
    <img class="button-move" src="${playerMove}-emoji.png">

    The computer took
    <img class="button-move" src="${computerMove}-emoji.png">

    <br><br>

    wins: ${score.wins}
    loss: ${score.loss}
    Ties: ${score.tie}`;
}

function makeComputerMove(){

    const random = Math.random();

    if(random < 1/3){
        return 'rock';
    }
    else if(random < 2/3){
        return 'paper';
    }
    else{
        return 'sicissors';
    }
}

function resetScore(){

    score = {
        wins:0,
        loss:0,
        tie:0
    };

    localStorage.removeItem('score');

    document.querySelector('.display').innerHTML =
    `wins: 0 loss: 0 Ties: 0`;
}

document.addEventListener('keydown', function(event){

    if(event.key === 'r'){
        playGame('rock');
    }
    else if(event.key === 'p'){
        playGame('paper');
    }
    else if(event.key === 's'){
        playGame('sicissors');
    }

});

</script>

</body>
</html>
